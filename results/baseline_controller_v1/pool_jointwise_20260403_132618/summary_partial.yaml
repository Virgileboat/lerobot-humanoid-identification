  - experiment_2s_sinus_1.8
  - experiment_2s_sinus_1.9
  - experiment_2s_sinus_2.0
  - experiment_2s_sinus_2.1
  - experiment_2s_sinus_2.2
  - experiment_2s_sinus_2.3
  - experiment_2s_sinus_2.4
  - experiment_2s_sinus_2.5
  - experiment_2s_sinus_2.8
  - experiment_2s_sinus_3.0
  - experiment_2s_sinus_3.2
  - experiment_2s_sinus_3.5
  - experiment_2s_step_inv
  joint_order:
  - right_ankle_roll
  - right_ankle_pitch
  - right_knee
  - right_hipy
  - right_hipx
  - right_hipz
  - left_ankle_roll
  - left_ankle_pitch
  - left_knee
  - left_hipy
  - left_hipx
  - left_hipz
  simulator:
    mjcf_path: lerobot-humanoid-models/models/bipedal_plateform_no_arms/mjcf/scene_fixed_base.xml
    device: cuda
    fixed_base: true
    sim_dt: 0.01
    physics_substeps_per_action: 1
    pool_multiprocessing: true
    pool_mp_start_method: spawn
    pool_pin_workers_to_cores: true
    pool_prefer_physical_cores: true
    pool_worker_num_threads: 1
    n_model: 16
    nworld: 26
  cmaes:
    popsize: 16
    maxiter: 300
    sigma0: 0.12
    seed: 0
    early_stop_std: 1.0
    respect_cma_stop: false
    optimize_gain_scale: false
    armature_scale_lb: 0.1
    armature_scale_ub: 100.0
    viscous_scale_lb: 0.1
    viscous_scale_ub: 100.0
    dry_scale_lb: 0.1
    dry_scale_ub: 100.0
    torque_limit_scale_lb: 0.5
    torque_limit_scale_ub: 1.5
    action_delay_steps_lb: 0.0
    action_delay_steps_ub: 15.0
    mass_scale_lb: 1.0
    mass_scale_ub: 1.01
    com_scale_lb: 1.0
    com_scale_ub: 1.01
    gain_scale_lb: 0.5
    gain_scale_ub: 2.0
    joint_order:
    - right_ankle_roll
    - right_ankle_pitch
    - right_knee
    - right_hipy
    - right_hipx
    - right_hipz
    - left_ankle_roll
    - left_ankle_pitch
    - left_knee
    - left_hipy
    - left_hipx
    - left_hipz
    debug_candidates: false
    debug_candidates_rows: 3
    progress_every: 1
  param_order:
  - armature
  - viscous_friction
  - dry_friction
  - torque_limit
  - action_delay_steps
  - kp
  - kv
  - mass_scale
  - com_x_scale
  - com_y_scale
  - com_z_scale
  base_gains:
    joint_order:
    - left_hipz
    - left_hipx
    - left_hipy
    - left_knee
    - left_ankle_pitch
    - left_ankle_roll
    - right_hipz
    - right_hipx
    - right_hipy
    - right_knee
    - right_ankle_pitch
    - right_ankle_roll
    kp:
    - 80.0
    - 80.0
    - 100.0
    - 100.0
    - 30.0
    - 30.0
    - 80.0
    - 80.0
    - 100.0
    - 100.0
    - 30.0
    - 30.0
    kv:
    - 4.0
    - 4.0
    - 5.0
    - 5.0
    - 1.0
    - 1.0
    - 4.0
    - 4.0
    - 5.0
    - 5.0
    - 1.0
    - 1.0
