  dry_scale_lb: 0.1
  dry_scale_ub: 100.0
  torque_limit_scale_lb: 0.5
  torque_limit_scale_ub: 1.5
  action_delay_steps_lb: 0.0
  action_delay_steps_ub: 15.0
  mass_scale_lb: 1.0
  mass_scale_ub: 1.01
  com_scale_lb: 1.0
  com_scale_ub: 1.01
  gain_scale_lb: 0.5
  gain_scale_ub: 2.0
  joint_order:
  - right_ankle_roll
  - right_ankle_pitch
  - right_knee
  - right_hipy
  - right_hipx
  - right_hipz
  - left_ankle_roll
